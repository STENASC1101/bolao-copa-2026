<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Bolão Copa 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 28px; color: #2196F3; margin-bottom: 2rem; text-align: center; }
        .form-container { max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #2196F3; box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1); }
        button { width: 100%; padding: 0.75rem; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; margin-bottom: 1rem; }
        button:hover { background: #1976D2; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .hidden { display: none !important; }
        .alert { padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-success { background: #E8F5E9; color: #2E7D32; border: 1px solid #4CAF50; }
        .alert-error { background: #FFEBEE; color: #C62828; border: 1px solid #f44336; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #f5f5f5; padding: 1rem; text-align: left; font-weight: 500; border-bottom: 2px solid #ddd; }
        td { padding: 1rem; border-bottom: 1px solid #eee; }
        .game-card { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 1rem; align-items: center; padding: 1.5rem; background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; }
        .game-card .team { text-align: center; }
        .game-card .team-name { font-weight: 500; margin-bottom: 0.5rem; }
        .game-card .vs { text-align: center; font-size: 20px; font-weight: bold; color: #999; }
        .button-group { display: flex; gap: 1rem; }
        .button-group button { flex: 1; margin: 0; }
        .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
        .btn-secondary:hover { background: #e0e0e0; }
        .game-date { font-size: 12px; color: #999; margin-bottom: 1rem; }
        .tabs { display: flex; gap: 0.5rem; border-bottom: 2px solid #ddd; margin-bottom: 2rem; }
        .tab-btn { padding: 1rem 1.5rem; background: transparent; border: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #2196F3; border-bottom-color: #2196F3; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media (max-width: 768px) {
            .game-card { grid-template-columns: 1fr; text-align: center; }
            .game-card .vs { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- AUTH VIEW -->
        <div id="authView">
            <div class="form-container">
                <h1>⚽ Bolão Copa 2026</h1>
                <p style="text-align: center; margin-bottom: 2rem; color: #666;">Sistema de palpites para a Copa do Mundo 2026</p>
                
                <button onclick="showForm('login')">Entrar</button>
                <button class="btn-secondary" onclick="showForm('register')">Registrar</button>
            </div>

            <div id="loginForm" class="form-container hidden">
                <h1 style="font-size: 20px; margin-bottom: 1.5rem;">Faça login</h1>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit">Entrar</button>
                    <button type="button" class="btn-secondary" onclick="showForm('main')">Voltar</button>
                </form>
            </div>

            <div id="registerForm" class="form-container hidden">
                <h1 style="font-size: 20px; margin-bottom: 1.5rem;">Registre-se</h1>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Nome completo</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <div class="form-group">
                        <label>CPF (11 dígitos)</label>
                        <input type="text" id="registerCPF" pattern="\d{11}" maxlength="11" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit">Registrar</button>
                    <button type="button" class="btn-secondary" onclick="showForm('main')">Voltar</button>
                </form>
            </div>
        </div>

        <!-- APP VIEW -->
        <div id="appView" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="margin: 0;">⚽ Bolão Copa 2026</h1>
                <button class="btn-secondary" onclick="logout()">Sair</button>
            </div>

            <div id="alertContainer"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('games')">🎮 Jogos</button>
                <button class="tab-btn" onclick="switchTab('ranking')">🏆 Ranking</button>
                <button class="tab-btn" id="adminTab" style="display: none;" onclick="switchTab('admin')">⚙️ Admin</button>
            </div>

            <div id="gamesTab" class="tab-content active">
                <div id="gamesList"></div>
            </div>

            <div id="rankingTab" class="tab-content">
                <table>
                    <thead>
                        <tr><th>Posição</th><th>Participante</th><th style="text-align: right;">Pontos</th><th style="text-align: right;">Acertos</th></tr>
                    </thead>
                    <tbody id="rankingBody">
                        <tr><td colspan="4" style="text-align: center; color: #999;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="adminTab" class="tab-content">
                <div class="card">
                    <h2>Aprovações Pendentes</h2>
                    <table id="approvalsTable">
                        <thead>
                            <tr><th>Nome</th><th>Email</th><th>CPF</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="approvalsBody">
                            <tr><td colspan="4" style="text-align: center; color: #999;">Nenhuma aprovação pendente</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabase = createClient('https://xajtqoehnstuyfquuvkn.supabase.co', 'sb_publishable_OQehLMFFpuxj0qMEJR8SMw_xSUJZ7ng')

        let currentUser = null
        let games = []
        let participants = []

        async function init() {
            const { data: { session } } = await supabase.auth.getSession()
            if (session) {
                const { data: user } = await supabase.from('users').select('*').eq('id', session.user.id).single()
                if (user && !user.approved && !user.is_admin) {
                    showAlert('Conta pendente de aprovação', 'error')
                    await supabase.auth.signOut()
                    return
                }
                currentUser = user
                showView('app')
                loadGames()
                loadRanking()
                if (user?.is_admin) {
                    document.getElementById('adminTab').style.display = 'block'
                    loadApprovals()
                }
            }
        }

        async function handleLogin(e) {
            e.preventDefault()
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            })
            if (error) { showAlert('Erro: ' + error.message, 'error'); return }
            
            const { data: user } = await supabase.from('users').select('*').eq('id', data.user.id).single()
            if (!user.approved && !user.is_admin) {
                showAlert('Conta pendente de aprovação', 'error')
                await supabase.auth.signOut()
                return
            }
            currentUser = user
            showView('app')
            loadGames()
            loadRanking()
            if (user?.is_admin) {
                document.getElementById('adminTab').style.display = 'block'
                loadApprovals()
            }
        }

        async function handleRegister(e) {
            e.preventDefault()
            const { data, error } = await supabase.auth.signUp({
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value
            })
            if (error) { showAlert('Erro: ' + error.message, 'error'); return }

            await supabase.from('users').insert({
                id: data.user.id,
                name: document.getElementById('registerName').value,
                cpf: document.getElementById('registerCPF').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                approved: false,
                is_admin: false
            })
            showAlert('Cadastro realizado! Aguarde aprovação.', 'success')
            showForm('main')
        }

        async function logout() {
            await supabase.auth.signOut()
            currentUser = null
            showView('auth')
        }

        async function loadGames() {
            const { data } = await supabase.from('games').select('*').order('game_date')
            games = data || getMockGames()
            renderGames()
        }

        function getMockGames() {
            return [
                { id: 1, team1: 'Brasil', team2: 'Argentina', game_date: '2026-06-15T20:00:00', result_published: false, score1: null, score2: null },
                { id: 2, team1: 'França', team2: 'Espanha', game_date: '2026-06-16T20:00:00', result_published: false, score1: null, score2: null },
                { id: 3, team1: 'Inglaterra', team2: 'Alemanha', game_date: '2026-06-17T20:00:00', result_published: false, score1: null, score2: null }
            ]
        }

        function renderGames() {
            const html = games.map(g => {
                const date = new Date(g.game_date)
                return `
                    <div class="game-card">
                        <div class="team"><div class="team-name">${g.team1}</div></div>
                        <div class="vs">VS</div>
                        <div class="team"><div class="team-name">${g.team2}</div></div>
                        <div style="grid-column: 1/-1; font-size: 12px; color: #999;">${date.toLocaleDateString('pt-BR')} às ${date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
                        <div style="grid-column: 1/-1;">
                            ${g.result_published ? `<p style="text-align: center; color: #4CAF50;">✓ ${g.score1} - ${g.score2}</p>` : `<button onclick="alert('Função de palpite em desenvolvimento')">+ Dar palpite</button>`}
                        </div>
                    </div>
                `
            }).join('')
            document.getElementById('gamesList').innerHTML = html || '<p style="text-align: center; color: #999;">Nenhum jogo disponível</p>'
        }

        async function loadRanking() {
            const { data: users } = await supabase.from('users').select('*').eq('approved', true)
            const html = (users || []).map((u, i) => `
                <tr>
                    <td>${i + 1}º</td>
                    <td>${u.name}</td>
                    <td style="text-align: right;">0</td>
                    <td style="text-align: right;">0</td>
                </tr>
            `).join('')
            document.getElementById('rankingBody').innerHTML = html || '<tr><td colspan="4" style="text-align: center; color: #999;">Nenhum participante</td></tr>'
        }

        async function loadApprovals() {
            const { data: pending } = await supabase.from('users').select('*').eq('approved', false).eq('is_admin', false)
            const html = (pending || []).map(u => `
                <tr>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.cpf}</td>
                    <td style="text-align: center;"><button onclick="approveUser(${u.id})" style="padding: 0.5rem 1rem; background: #4CAF50;">✓</button></td>
                </tr>
            `).join('')
            document.getElementById('approvalsBody').innerHTML = html || '<tr><td colspan="4" style="text-align: center; color: #999;">Nenhuma aprovação</td></tr>'
        }

        window.approveUser = async function(id) {
            await supabase.from('users').update({ approved: true }).eq('id', id)
            loadApprovals()
            loadRanking()
        }

        function showForm(form) {
            document.getElementById('loginForm').classList.add('hidden')
            document.getElementById('registerForm').classList.add('hidden')
            if (form === 'login') document.getElementById('loginForm').classList.remove('hidden')
            if (form === 'register') document.getElementById('registerForm').classList.remove('hidden')
        }

        function showView(view) {
            document.getElementById('authView').classList.toggle('hidden', view !== 'auth')
            document.getElementById('appView').classList.toggle('hidden', view !== 'app')
        }

        function showAlert(msg, type) {
            const alert = document.createElement('div')
            alert.className = `alert alert-${type}`
            alert.textContent = msg
            document.getElementById('alertContainer').appendChild(alert)
            setTimeout(() => alert.remove(), 3000)
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'))
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'))
            document.getElementById(tab + 'Tab').classList.add('active')
            event.target.classList.add('active')
        }

        window.handleLogin = handleLogin
        window.handleRegister = handleRegister
        window.logout = logout
        window.showForm = showForm

        init()
    </script>
</body>
</html>
